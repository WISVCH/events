<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="admin/admin-layout" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <title>CH Events | Administrator > Create/edit webhook</title>
</head>
<body>
<!--/*@thymesVar id="webhook" type="ch.wisv.events.domain.model.webhook.Webhook"*/-->
<!--/*@thymesVar id="errors" type="java.util.Map"*/-->
<div layout:fragment="content">
    <h1 class="mb-4 border-bottom-0 font-weight-light">Create/update webhook</h1>

    <div th:replace="fragments/messages :: messages"></div>

    <form th:action="${#httpServletRequest.requestURI}" th:object="${webhook}" method="POST">
        <div class="row">
            <div class="col">
                <div class="card">
                    <h6 class="card-header">Details</h6>
                    <div class="card-body">
                        <div class="form">
                            <div class="form-group">
                                <label>Payload URL
                                    <input type="text" class="form-control" th:field="*{payloadUrl}"
                                           th:classappend="${errors.containsKey('payloadUrl')} ? 'is-invalid'"/>
                                    <span class="invalid-feedback" th:text="${errors.get('payloadUrl')}"></span>
                                </label>
                            </div>
                            <div class="form-group">
                                <label>Secret <span class="required">*</span>
                                    <input type="text" class="form-control" th:field="*{secret}"
                                           th:classappend="${errors.containsKey('secret')} ? 'is-invalid'"/>
                                    <span class="invalid-feedback" th:text="${errors.get('secret')}"></span>
                                </label>
                            </div>
                            <div class="form-group">
                                <label>LDAP group <span class="required">*</span>
                                    <select class="mb-0 form-control" th:field="*{authLdapGroup}"
                                            th:classappend="${errors.containsKey('authLdapGroup')} ? 'is-invalid'">
                                        <!--/*@thymesVar id="group" type="ch.wisv.events.domain.model.user.LdapGroup"*/-->
                                        <option value="">-- Select a commissie --</option>
                                        <option th:each="group : ${T(ch.wisv.events.domain.model.user.LdapGroup).values()}"
                                                th:value="${group}"
                                                th:text="${group.getName()}">
                                        </option>
                                    </select>
                                    <span class="invalid-feedback" th:text="${errors.get('authLdapGroup')}"></span>
                                    <small class="form-text text-muted">
                                        Select CH Beheer/W3Cie when the update should always be send.
                                    </small>
                                </label>
                            </div>
                            <div class="form-group">
                                <label class="form-check-label custom-control custom-checkbox">
                                    Active
                                    <input type="checkbox" class="custom-control-input"
                                           th:field="*{active}"
                                           th:checked="${webhook.isActive()}">
                                    <span class="custom-control-indicator"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card">
                    <h6 class="card-header">Events</h6>
                    <div class="card-body">
                        <!--/*@thymesVar id="webhookEvent" type="ch.wisv.events.domain.model.webhook.WebhookEvent"*/-->
                        <div class="row">
                            <div class="col-6 mb-3"
                                 th:each="webhookEvent : ${T(ch.wisv.events.domain.model.webhook.WebhookEvent).values()}">
                                <label class="form-check-label custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input"
                                           th:field="*{events}"
                                           th:value="${webhookEvent}"
                                           th:checked="${webhook.getEvents().contains(webhookEvent)}">
                                    <span class="custom-control-indicator"></span>
                                    <span class="custom-control-description">
                                        <span class="text-primary text-uppercase">[[${webhookEvent.getName()}]]</span><br>
                                        <span class="text-dark font-weight-normal">[[${webhookEvent.getDescription()}]]</span>
                                    </span>
                                </label>
                            </div>
                            <span class="col-12 font-weight-bold invalid-feedback d-block"
                                  th:text="${errors.get('events')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-body">
                <div class="form-group mb-0">
                    <input type="submit" class="btn btn-danger" value="Save webhook">
                </div>
            </div>
        </div>
    </form>
</div>
`</body>
</html>
