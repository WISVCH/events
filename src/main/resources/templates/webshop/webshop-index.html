<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      layout:decorate="webshop/webshop-layout" xmlns:layout="http://www.w3.org/1999/xhtml">
<head>
    <title>CH Events | Webshop</title>
</head>
<body>
<h1 layout:fragment="title">CH Events | Webshop</h1>

<!--/*@thymesVar id="event" type="ch.wisv.events.domain.model.event.Event"*/-->
<!--/*@thymesVar id="cat" type="ch.wisv.events.domain.model.event.EventCategory"*/-->
<div layout:fragment="content">
    <div class="row">
        <div class="ml-auto col-lg-4 col-md-5 col-12 my-4">
            <a href="#" class="btn btn-block btn-secondary" data-toggle="modal" data-target="#shoppingBasket"
               id="shoppingBasketButton">
                <i class="fa fa-fw fa-shopping-basket"></i> Shopping basket (<span id="shoppingBasketCount"></span>)
            </a>
        </div>
    </div>
    <div class="row">
        <div class="col-12 col-md-4 mb-4">
            <div class="card">
                <div class="card-header" data-toggle="collapse" data-target="#filterCard">
                    <h6 class="mb-0">Filters</h6>
                </div>

                <div class="card-body collapse" id="filterCard">
                    <form th:action="@{'/webshop'}" th:object="${filterDto}" method="GET">
                        <div class="form-group">
                            <label>Search
                                <input type="text" class="form-control" th:field="*{search}" placeholder="Search...">
                            </label>
                        </div>
                        <div class="form-group">
                            <label class="mb-2">Categories</label>

                            <!--/*@thymesVar id="category" type="ch.wisv.events.domain.model.event.EventCategory"*/-->
                            <div class="form-check pl-0"
                                 th:each="category : ${T(ch.wisv.events.domain.model.event.EventCategory).values()}">
                                <label class="form-check-label custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input"
                                           th:field="*{categories}"
                                           th:value="${category}">
                                    <span class="custom-control-indicator"></span>
                                    <span class="custom-control-description text-dark font-weight-normal">[[${category.getDisplayName()}]]</span>
                                </label>
                            </div>
                        </div>
                        <button class="btn btn-block btn-info">
                            <i class="fa fa-fw fa-filter"></i> apply filter
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-8">
            <div class="card mb-4" th:each="event: ${events}" th:if="${events.size() > 0}">
                <div class="card-body">
                    <div class="row">
                        <div th:replace="webshop/fragment/event-item :: event-item"></div>
                        <div class="col-12 col-lg-6 col-xl-4">
                            <div class="row h-100">
                                <div class="col-12 align-self-start">
                                    <h1 class="display-4 align-self-start text-right">
                                        <small class="font-weight-light">v.a.</small>
                                        <span th:text="'€ ' + ${#numbers.formatDecimal(event.getProducts()[0].getPrice(), 1, 'POINT', 2,'COMMA')}"></span>
                                    </h1>
                                </div>
                                <div class="col-12 align-self-end">
                                    <a th:href="@{'/webshop/' + ${event.getPublicReference()}}"
                                       class="btn btn-block btn-info align-self-end">
                                        <i class="fas fa-fw fa-coins"></i> buy tickets
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card mb-4" th:if="${events.size() == 0}">
                <div class="card-body text-center">
                    <img th:src="@{'/images/owl-icon.jpg'}" class="img-fluid" style="width: 50%" alt="">
                    <h6 class="display-4">Owl no, no events found!</h6>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="webshop/fragment/shopping-basket :: shopping-basket"></div>
</div>


<script layout:fragment="script" th:inline="javascript">
    jQuery(document).ready(function ($) {
        ShoppingBasket.init();

        if ($(document).width() > 768) {
            $("#filterCard").addClass('show');
        }
    });
</script>
</body>
</html>
