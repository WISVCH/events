services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: events-app
    working_dir: /workspace
    command: sleep infinity
    init: true
    volumes:
      - .:/workspace:cached
      - gradle-cache:/home/dev/.gradle
      - m2-cache:/home/dev/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev,devcontainer
    depends_on:
      - db
      - mailcatcher
      - oidc
    ports:
      - "3090:3090"

volumes:
  gradle-cache:
  m2-cache:
